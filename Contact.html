<head>

    <title>Contact</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }

        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: #111;

            color: #fff;

            overflow-x: hidden;

            min-height: 100vh;

        }

        /* ================= NAVBAR ================= */

        .navbar {

            position: sticky;

            top: 0;

            z-index: 1000;

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 1rem 5%;

            background: rgba(15,15,35,0.75);

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            border-bottom: 1px solid rgba(255,255,255,0.1);

        }

        .brand-container {

            display: flex;

            align-items: center;

            gap: 10px;

        }

        .nav-links {

            display: flex;

            align-items: center;

            gap: 2rem;

            list-style: none;

        }

        .nav-links a {

            position: relative;

            text-decoration: none;

            color: #e5e7eb;

            font-weight: 500;

            font-size: 1rem;

            padding: 0.5rem 0;

            transition: 0.3s ease;

        }

        .nav-links a::after {

            content: '';

            position: absolute;

            left: 0;

            bottom: 0;

            width: 100%;

            height: 2px;

            background: linear-gradient(90deg,#8b5cf6,#06b6d4);

            transform: scaleX(0);

            transform-origin: right;

            transition: transform 0.4s ease;

        }

        .nav-links a:hover,

        .nav-links a.active {

            color: #fff;

        }

        .nav-links a:hover::after,

        .nav-links a.active::after {

            transform: scaleX(1);

            transform-origin: left;

        }

        #menu-toggle {

            display: none;

        }

        .hamburger {

            display: none;

            flex-direction: column;

            gap: 5px;

            cursor: pointer;

        }

        .hamburger span {

            width: 28px;

            height: 3px;

            background: #fff;

            border-radius: 5px;

            transition: 0.3s;

        }

        /* ================= MAIN CONTAINER ================= */

        .container {

            width: 100%;

            max-width: 1200px;

            margin: auto;

            padding: 40px 20px 120px;

            text-align: center;

        }

        /* ================= CONTACT CARDS ================= */

        .cards {

            display: grid;

            grid-template-columns: repeat(4,1fr);

            gap: 20px;

            margin-bottom: -50px;

            position: relative;

            z-index: 2;

        }

        .card {

            background: #eee;

            padding: 25px 18px;

            box-shadow: 0 3px 8px rgba(0,0,0,0.2);

            border-radius: 15px;

            transition: 0.3s ease;

        }

        .card:hover {

            transform: translateY(-5px);

        }

        .card i {

            font-size: 28px;

            color: #22b1b6;

            margin-bottom: 10px;

            display: block;

        }

        .card h4 {

            font-size: 14px;

            margin-bottom: 10px;

            font-weight: bold;

            color: #111;

        }

        .card p {

            font-size: 13px;

            color: #111;

            line-height: 1.6;

            word-wrap: break-word;

        }

        /* ================= CONTACT BOX ================= */

        .contact-box {

            background: #22b1b6;

            padding: 100px 30px 40px;

            box-shadow: 0 5px 10px rgba(0,0,0,0.3);

            border-radius: 20px;

        }

        .contact-box h2 {

            margin-bottom: 30px;

            color: #111;

            font-size: clamp(1.8rem,4vw,2.5rem);

        }

        .contact-box form {

            display: flex;

            flex-direction: column;

            align-items: center;

        }

        .contact-box input,

        .contact-box textarea {

            width: 100%;

            max-width: 700px;

            padding: 14px;

            margin: 10px 0;

            border: none;

            outline: none;

            border-radius: 10px;

            font-size: 1rem;

        }

        .contact-box textarea {

            min-height: 180px;

            resize: vertical;

        }

        .contact-box button {

            margin-top: 15px;

            padding: 14px 35px;

            border: 2px solid #111;

            background: white;

            color: black;

            cursor: pointer;

            transition: 0.3s ease;

            border-radius: 10px;

            font-weight: bold;

            font-size: 1rem;

        }

        .contact-box button:hover {

            background: #111;

            color: #fff;

            border-color: #22b1b6;

        }

        /* ================= FOOTER ================= */

        .footer {

            background: rgba(15,15,35,0.9);

            backdrop-filter: blur(12px);

            -webkit-backdrop-filter: blur(12px);

            padding: 20px 10px;

            margin-top: 40px;

        }

        .footer-icons {

            display: flex;

            justify-content: center;

            flex-wrap: wrap;

            gap: 15px;

        }

        .icon-btn {

            width: 50px;

            height: 50px;

            border-radius: 50%;

            background: #222;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: 0.3s ease;

            text-decoration: none;

        }

        .icon-btn:hover {

            transform: translateY(-4px);

        }

        .icon-btn svg {

            width: 24px;

            height: 24px;

            fill: #fff;

        }

        .facebook:hover {
            background: #1877f2;
        }

        .email:hover {
            background: orange;
        }

        .whatsapp:hover {
            background: #25d366;
        }

        .call:hover {
            background: #28a745;
        }

        .github:hover {
            background: #333;
        }

        .youtube:hover {
            background: #ff0000;
        }

        .footer p {

            text-align: center;

            margin-top: 15px;

            font-size: 0.95rem;

            color: #ccc;

        }

        /* ================= TABLET ================= */

@media (max-width:992px) {

            .cards {

                grid-template-columns: repeat(2,1fr);

                margin-bottom: 20px;

            }

            .contact-box {

                padding-top: 50px;

            }

        }

        /* ================= MOBILE NAV ================= */

@media (max-width:768px) {

            .hamburger {

                display: flex;

                z-index: 1001;

            }

            .nav-links {

                position: fixed;

                top: 0;

                right: -100%;

                width: 50%;

                max-width: 320px;

                height: 100vh;

                flex-direction: column;

                justify-content: center;

                align-items: center;

                background: rgba(15,15,35,0.96);

                backdrop-filter: blur(18px);

                -webkit-backdrop-filter: blur(18px);

                transition: right 0.4s ease;

            }

            #menu-toggle:checked ~ .nav-links {

                right: 0;

            }

            #menu-toggle:checked ~ .hamburger span:nth-child(1) {

                transform: rotate(45deg) translate(5px,6px);

            }

            #menu-toggle:checked ~ .hamburger span:nth-child(2) {

                opacity: 0;

            }

            #menu-toggle:checked ~ .hamburger span:nth-child(3) {

                transform: rotate(-45deg) translate(5px,-6px);

            }

            .container {

                padding: 30px 15px 80px;

            }

        }

        /* ================= SMALL MOBILE ================= */

@media (max-width:600px) {

            .cards {

                grid-template-columns: 1fr;

            }

            .card {

                width: 100%;

            }

            .contact-box {

                padding: 40px 20px;

            }

            .contact-box input,

            .contact-box textarea {

                font-size: 0.95rem;

            }

            .contact-box button {

                width: 100%;

                max-width: 300px;

            }

            .icon-btn {

                width: 45px;

                height: 45px;

            }

            .icon-btn svg {

                width: 20px;

                height: 20px;

            }

            .footer p {

                font-size: 0.85rem;

            }

        }

        /* ================= EXTRA SMALL ================= */

@media (max-width:400px) {

            .navbar {

                padding: 1rem 4%;

            }

            .nav-links {

                width: 50%;

            }

            .contact-box h2 {

                font-size: 1.6rem;

            }

        }

    </style>
