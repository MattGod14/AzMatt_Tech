<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>

  <style>
    *{
      margin:0;
      padding:5px;
      box-sizing:border-box;
    }

    body{
      background-color:#111;
      color:gold;
      font-family:'Segoe UI', sans-serif;
      /* Responsive Layout */
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .coming-soon{
      font-size:clamp(2rem, 8vw, 5rem);
      line-height:1.3;
      word-wrap:break-word;
      font-weight:bolder;
    }

.button-wrapper{
    display: flex;
    justify-content: center;
    width: 100%;
}

.blogspot{
    background-color: aqua;
    color: black;
    font-weight: bolder;
    border: 2px solid white;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
}

.blogspot:hover{
    background-color: gold;
    color: #000;
    font-weight: bold;
    transform: scale(1.05);
}

    footer{
      width:100%;
      text-align:center;
      padding:15px;
      background:#111;
      color:#fff;
      font-size:clamp(0.9rem, 2vw, 1rem);
      /* Keeps footer at bottom naturally */
      margin-top:auto;
      border-top:1px solid #333;
    }

    /* Small phones */
    @media (max-width:480px){
      body{
        padding:15px;
      }

      .coming-soon{
        font-size:2rem;
      }
    }

    /* Tablets */
    @media (min-width:768px){
      body{
        padding:40px;
      }
    }

    /* Large screens */
    @media (min-width:1200px){
      .coming-soon{
        font-size:5rem;
      }
    }
  </style>
</head>

<body>

  <div class="coming-soon">
    . . . Coming Soon . . .
  </div>
    <div class="button-wrapper">
        <form action="index.html">
            <button class="blogspot">Go Back</button>
        </form>
    </div>
  <footer>
    <p>&copy; 2026 AzMatt Tech | All Rights Reserved</p>
  </footer>

</body>
</html>
