<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blank</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    min-height: 100vh;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
}

/* MAIN CONTENT */
.container{
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 20px;
    padding: 40px 15px;
}

.header{
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    line-height: 1.3;
    max-width: 900px;
}

.header-{
    font-size: clamp(1.8rem, 5vw, 3rem);
}

/* BUTTON */
.button-wrapper{
    display: flex;
    justify-content: center;
    width: 100%;
}

.blogspot{
    background-color: #000;
    color: #fff;
    border: 2px solid aqua;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
}

.blogspot:hover{
    background-color: gold;
    color: #000;
    font-weight: bold;
    transform: scale(1.05);
}

/* FOOTER */
footer{
    text-align: center;
    padding: 15px;
    background: #111;
    color: #fff;
    margin-top: 20px;
    font-size: clamp(0.85rem, 2vw, 1rem);
    border-radius: 10px;
}

/* MOBILE DEVICES */
@media (max-width: 600px){

    body{
        padding: 15px;
    }

    .container{
        padding: 30px 10px;
        gap: 15px;
    }

    .blogspot{
        width: 100%;
        max-width: 250px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h2 class="header">
        We're sorry. There's no new article available at the moment.
        Come back later for more.
    </h2>

    <h1 class="header-">Thank you.</h1>

    <div class="button-wrapper">
        <form action="Blog.html">
            <button class="blogspot">Home</button>
        </form>
    </div>

</div>

<footer>
    <p>&copy; 2026 AzMatt Tech | All Rights Reserved</p>
</footer>

</body>
</html>
